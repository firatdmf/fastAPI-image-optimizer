    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-3xl font-extrabold text-slate-800 mb-2 text-center">AVIF Optimizer</h1>

      <div class="flex justify-center gap-6 mb-6">
        <label class="cursor-pointer group">
          <input type="radio" name="format-choice" value="avif" checked class="hidden peer" />
          <span class="px-4 py-2 rounded-lg border-2 border-slate-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 text-slate-600 transition-all">AVIF</span>
        </label>
        <label class="cursor-pointer group">
          <input type="radio" name="format-choice" value="webp" class="hidden peer" />
          <span class="px-4 py-2 rounded-lg border-2 border-slate-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 text-slate-600 transition-all">WebP</span>
        </label>
      </div>

      <div id="drop-zone" class="border-4 border-dashed rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all bg-slate-50">
        <p class="text-lg text-slate-700 font-semibold text-center">Drag & Drop or Click to Add Images</p>
        <input type="file" id="file-input" class="hidden" accept="image/*" multiple />
      </div>

      <div id="preview-container" class="mt-8 hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-slate-700">Ready to Optimize (<span id="count">0</span>)</h2>
          <button id="btn-optimize" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold shadow-lg transition-transform active:scale-95">Optimize All</button>
        </div>
        <div id="preview-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 max-h-96 overflow-y-auto p-2 border rounded-lg bg-gray-50"></div>
      </div>

      <div id="status" class="mt-6 hidden text-center">
        <div class="spinner border-blue-500 border-t-transparent animate-spin inline-block w-8 h-8 border-4 rounded-full mb-2"></div>
        <p class="text-blue-600 font-bold">Processing Batch...</p>
      </div>
    </div>

    <script src="/static/action.js"></script>
  </body>
